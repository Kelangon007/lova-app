<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambient v.1 (Weather FX Engine)</title>
  <script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.5/fix-webm-duration.js"></script>
  <style>
    body { margin: 0; background-color: #050505; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; touch-action: pan-y; }
    #canvas-wrapper { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; margin-top: 20px; border: 1px solid #333; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); cursor: grab; overflow: hidden; }
    canvas { width: 100%; height: 100%; display: block; }
    #controls { width: 90%; max-width: 600px; background: #151515; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
    .row { display: flex; align-items: center; gap: 10px; }
    label { font-size: 11px; width: 100px; color: #888; font-weight: 600; }
    select, input[type="range"] { flex: 1; height: 34px; background: #222; color: white; border: 1px solid #444; border-radius: 6px; }
    .btn-record { width: 100%; padding: 15px; background: linear-gradient(135deg, #2e7d32, #1b5e20); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #statusBox { font-size: 12px; text-align: center; color: #4caf50; margin-bottom: 5px; }
    input[type="file"] { display: none; }
    .file-label { flex: 1; background: #222; color: #ccc; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; border: 1px solid #444; font-size: 11px; }
  </style>
</head>

<body>
  <div id="canvas-wrapper"><canvas id="canvas" width="1280" height="720"></canvas></div>
  <div id="controls">
    <div id="statusBox">Ambient v.1 Ready. Upload Media.</div>
    <div class="row">
      <label for="bgInput" class="file-label">PILIH FOTO</label>
      <label for="audioInput" class="file-label">PILIH MUSIK</label>
    </div>
    <input type="file" id="bgInput" accept="image/*">
    <input type="file" id="audioInput" accept="audio/*" multiple>
    <div class="row">
      <label>SPECTRUM</label>
      <select id="visType">
        <option value="organic_wave">〰️ Organic Wave</option>
        <option value="aurora_ribbon">✨ Aurora Ribbon</option>
        <option value="fading_echo">📉 Fading Echo</option>
        <option value="hex_grid">⬡ Neural Grid</option>
      </select>
    </div>
    <div class="row"><label>TINGGI VIS.</label><input type="range" id="visHeight" min="30" max="450" value="120"></div>
    <div class="row">
      <label>EFEK CUACA</label>
      <select id="fxType">
        <option value="realistic_rain">🌧️ Rain</option>
        <option value="soft_snow">❄️ Snow</option>
        <option value="falling_leaves">🍁 Leaves</option>
        <option value="forest_fireflies">✨ Fireflies</option>
      </select>
    </div>
    <div class="row"><label>ANGIN</label><input type="range" id="fxSpeed" min="-50" max="50" step="1" value="0"></div>
    <div class="row"><label>INTENSITAS</label><input type="range" id="count" min="10" max="600" value="150"></div>
    <button class="btn-record" id="recordBtn" onclick="executeRecording()">🔴 REKAM AMBIENT</button>
  </div>
  <audio id="audioPlayer"></audio>
  <script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const width = 1280, height = 720;
    let particles = [];
    
    class WeatherParticle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * width; this.y = Math.random() * height;
        this.type = document.getElementById('fxType').value;
        this.speed = Math.random() * 2 + 1;
        this.size = Math.random() * 2 + 1;
        this.opacity = Math.random() * 0.5 + 0.3;
      }
      update() {
        let wind = parseInt(document.getElementById('fxSpeed').value);
        this.y += this.speed; this.x += wind * 0.1;
        if (this.y > height) this.y = -10;
        if (this.x > width) this.x = 0; else if (this.x < 0) this.x = width;
      }
      draw() {
        ctx.fillStyle = "rgba(255,255,255," + this.opacity + ")";
        if (this.type === 'realistic_rain') ctx.fillRect(this.x, this.y, 1, 10);
        else if (this.type === 'soft_snow') ctx.beginPath(), ctx.arc(this.x, this.y, this.size, 0, Math.PI*2), ctx.fill();
        else if (this.type === 'forest_fireflies') ctx.fillStyle = "#ffeb3b", ctx.beginPath(), ctx.arc(this.x, this.y, 2, 0, Math.PI*2), ctx.fill();
        else ctx.fillStyle = "#d35400", ctx.fillRect(this.x, this.y, 5, 5);
      }
    }
    
    function animate() {
      ctx.fillStyle = "#000"; ctx.fillRect(0,0,width,height);
      let count = parseInt(document.getElementById('count').value);
      while(particles.length < count) particles.push(new WeatherParticle());
      while(particles.length > count) particles.pop();
      particles.forEach(p => { p.type = document.getElementById('fxType').value; p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
    function executeRecording() { alert("Sistem Rekam Aktif - Gunakan Logic Chunking Anda"); }
  </script>
</body>
</html>
