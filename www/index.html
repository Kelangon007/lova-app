<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lova Fav: True Shuffle, Clean Kanvas (Vinyl 720p)</title>
  <script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.5/fix-webm-duration.js"></script>
  <style>
    body {
      margin: 0;
      background-image: linear-gradient(45deg, #333 25%, transparent 25%), linear-gradient(-45deg, #333 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #333 75%), linear-gradient(-45deg, transparent 75%, #333 75%);
      background-size: 20px 20px;
      background-color: #444;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 50px;
      touch-action: pan-y;
    }

    #canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      margin-top: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: transparent;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
      cursor: grab;
      overflow: hidden;
    }

    #canvas-wrapper:active {
      cursor: grabbing;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #controls {
      width: 90%;
      max-width: 600px;
      background: #222;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      border: 1px solid #444;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .btn-group,
    .play-group {
      display: flex;
      gap: 8px;
    }

    .file-label {
      flex: 1;
      background: #333;
      color: #ccc;
      padding: 12px 5px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      border: 1px solid #555;
      transition: 0.2s;
      white-space: nowrap;
    }

    .file-label:hover {
      background: #444;
      color: white;
    }

    #playBtn {
      flex: 2;
      padding: 15px;
      background: #444;
      color: #888;
      border: 2px solid #333;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    #playBtn.ready {
      background: linear-gradient(135deg, #00d2ff, #e040fb);
      color: white;
      border: none;
    }

    #nextBtn {
      flex: 1;
      padding: 15px;
      background: #555;
      color: #aaa;
      border: 2px solid #444;
      border-radius: 8px;
      font-weight: bold;
      cursor: not-allowed;
      transition: 0.3s;
    }

    #nextBtn.ready {
      background: #333;
      color: white;
      border: 2px solid #555;
      cursor: pointer;
    }

    #nextBtn.ready:hover {
      background: #555;
    }

    .progress-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #333;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #444;
    }

    .time-text {
      font-size: 11px;
      font-family: monospace;
      color: #00d2ff;
      min-width: 40px;
      text-align: center;
    }

    #progressBar {
      flex: 1;
      height: 5px;
      -webkit-appearance: none;
      background: #555;
      border-radius: 5px;
      cursor: pointer;
    }

    #progressBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      background: #e040fb;
      border-radius: 50%;
      cursor: pointer;
    }

    .btn-record {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff4444, #d32f2f);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #stopOverlay {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(220, 20, 60, 0.95);
      color: white;
      padding: 15px 30px;
      border-radius: 50px;
      z-index: 100;
      font-weight: bold;
      border: 3px solid white;
      cursor: pointer;
    }

    #countdownOverlay {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 100px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
      z-index: 100;
    }

    #statusBox {
      font-size: 12px;
      text-align: center;
      color: #00d2ff;
      margin-bottom: 5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 11px;
      width: 80px;
      color: #ccc;
      font-weight: 600;
    }

    input[type="range"],
    select {
      flex: 1;
      height: 36px;
      background: #333;
      color: white;
      border: 1px solid #555;
      border-radius: 6px;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>

<body>

  <div id="canvas-wrapper">
    <canvas id="canvas" width="1280" height="720"></canvas>
    <div id="countdownOverlay">3</div>
    <div id="stopOverlay" onclick="stopRecording()">⏹ STOP & SIMPAN</div>
  </div>

  <div id="controls">
    <div id="statusBox">Siap. Silakan Upload Foto Latar & Banyak Musik.</div>
    <div class="btn-group">
      <label for="bgInput" class="file-label" style="border-bottom: 3px solid #00bcd4">1. FOTO LATAR</label>
      <label for="audioInput" class="file-label" style="border-bottom: 3px solid #e040fb">2. MUSIK (BANYAK)</label>
    </div>

    <div class="play-group">
      <button id="playBtn" onclick="togglePlay()">⚠ PUTAR MUSIK</button>
      <button id="nextBtn" onclick="playRandomSong(false)">⏭ NEXT</button>
    </div>

    <div class="progress-container">
      <span id="currTime" class="time-text">00:00</span>
      <input type="range" id="progressBar" value="0" min="0" step="0.1">
      <span id="durTime" class="time-text">00:00</span>
    </div>

    <input type="file" id="bgInput" accept="image/*">
    <input type="file" id="audioInput" accept="audio/*" multiple>

    <hr style="border: 0; border-top: 1px solid #444; width: 100%; margin: 5px 0;">

    <div class="row">
      <label style="color:#00d2ff;">VISUALIZER</label>
      <select id="visType">
        <option value="bw_oscilloscope">📺 B&W Oscilloscope</option>
        <option value="zebra_bars">🎹 Zebra Stripes</option>
        <option value="ghost_blocks">👻 Ghost Grid</option>
        <option value="winamp_peaks">📻 Winamp Peaks</option>
        <option value="retro_led">🚦 Retro LED Meter</option>
        <option value="wireframe_bars">🧊 Wireframe Bars</option>
        <option value="classic_bars">🎙️ Classic Blocks</option>
        <option value="split_bars">⏸️ Split Bars</option>
        <option value="step_blocks">🧱 Step Blocks</option>
        <option value="peak_dots">〰️ Peak Dots</option>
      </select>
    </div>

    <div class="row"><label>TINGGI VIS.</label><input type="range" id="visHeight" min="30" max="450" value="120"></div>
    <div class="row"><label style="color:#ff9800;">UKURAN ASAP</label><input type="range" id="smokeSize" min="0.2" max="3.0" step="0.1" value="1.0"></div>

    <hr style="border: 0; border-top: 1px dashed #444; width: 100%; margin: 5px 0;">

    <div class="row">
      <label>EFEK FILM</label>
      <select id="type">
        <option value="vintage">🎞️ Vintage HD (Kotor, Debu, Rambut)</option>
        <option value="grain">🎬 Grains (Bintik & Debu Saja)</option>
        <option value="scratch">📽️ Scratches (Garis Vertikal Saja)</option>
        <option value="none">Tanpa Efek</option>
      </select>
    </div>

    <div class="row">
      <label>ARAH EFEK</label>
      <select id="fxAngle">
        <option value="0">Lurus (Normal)</option>
        <option value="15">Miring Kanan 15°</option>
        <option value="30">Miring Kanan 30°</option>
        <option value="-15">Miring Kiri 15°</option>
        <option value="-30">Miring Kiri 30°</option>
      </select>
    </div>

    <div class="row"><label>KECEPATAN</label><input type="range" id="fxSpeed" min="0.1" max="5.0" step="0.1" value="1.0"></div>
    <div class="row"><label>JUMLAH FX</label><input type="range" id="count" min="0" max="400" value="100"></div>

    <button class="btn-record" id="recordBtn" onclick="startCountdownAndRecord()">🔴 MULAI REKAM 720p</button>
  </div>

  <audio id="audioPlayer" crossorigin="anonymous"></audio>

  <script>
    const statusBox = document.getElementById('statusBox');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const audioPlayer = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const nextBtn = document.getElementById('nextBtn');
    const stopOverlay = document.getElementById('stopOverlay');
    const countdownOverlay = document.getElementById('countdownOverlay');
    const recordBtn = document.getElementById('recordBtn');
    const progressBar = document.getElementById('progressBar');
    const currTimeEl = document.getElementById('currTime');
    const durTimeEl = document.getElementById('durTime');
    let isDraggingProgress = false;
    const width = 1280;
    const height = 720;

    let audioFiles = [];
    let currentObjectUrl = null;
    let currentSongName = "";
    let playTimeout = null;
    let isTrackLoaded = false;
    let shuffledPlaylist = [];
    let currentPlayIndex = 0;
    let isCountingDown = false;
    let countdownTimer = null;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    document.getElementById('audioInput').addEventListener('change', function(e) {
      if (this.files.length > 0) {
        audioFiles = Array.from(this.files);
        isTrackLoaded = true;
        shuffledPlaylist = shuffle(Array.from({ length: audioFiles.length }, (v, k) => k));
        currentPlayIndex = 0;
        playBtn.innerHTML = "▶ PLAY MUSIK";
        playBtn.classList.add('ready');
        nextBtn.classList.add('ready');
        statusBox.innerText = `${audioFiles.length} Lagu dimuat. Siap diputar!`;
        progressBar.value = 0;
        currTimeEl.innerText = "00:00";
        durTimeEl.innerText = "00:00";
        audioPlayer.pause();
        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
        currentSongName = "Musik Diunggah";
      }
    });

    function playRandomSong(isInstant = false) {
      if (audioFiles.length === 0) return;
      if (playTimeout) clearTimeout(playTimeout);
      if (currentPlayIndex >= shuffledPlaylist.length) {
        currentPlayIndex = 0;
        stopEverything();
        return;
      }
      if (currentObjectUrl && isInstant) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }
      const delayAmount = isInstant ? 0 : 3500;
      if (!isInstant) {
        audioPlayer.pause();
        playBtn.innerText = "⏳ TUNGGU...";
        statusBox.innerText = "⏳ Jeda pergantian lagu...";
        currentSongName = "Memuat...";
        progressBar.value = 0;
        currTimeEl.innerText = "00:00";
        durTimeEl.innerText = "00:00";
      }
      playTimeout = setTimeout(() => {
        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
        const actualFileIndex = shuffledPlaylist[currentPlayIndex];
        const selectedFile = audioFiles[actualFileIndex];
        currentSongName = selectedFile.name.replace(/\.[^/.]+$/, "");
        currentObjectUrl = URL.createObjectURL(selectedFile);
        audioPlayer.src = currentObjectUrl;
        audioPlayer.load();
        if (!audioCtx) initAudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioPlayer.play().then(() => {
          playBtn.innerText = "⏸ PAUSE";
          statusBox.innerText = `🎵 Lagu ${currentPlayIndex + 1}/${audioFiles.length}: ${currentSongName}`;
          currentPlayIndex++;
        }).catch(err => {
          playBtn.innerText = "❌ ERROR";
        });
      }, delayAmount);
    }

    audioPlayer.addEventListener('ended', () => {
      playRandomSong(false);
    });

    function stopEverything() {
      audioPlayer.pause();
      if (playTimeout) clearTimeout(playTimeout);
      if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
      currentObjectUrl = null;
      currentSongName = "Playlist Selesai";
      if (dataArray) dataArray.fill(0);
      shuffledPlaylist = shuffle(Array.from({ length: audioFiles.length }, (v, k) => k));
      statusBox.innerText = `✅ Semua lagu selesai.`;
      playBtn.innerText = "▶ PLAY ACAK";
      progressBar.value = 0;
      currTimeEl.innerText = "00:00";
      durTimeEl.innerText = "00:00";
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        statusBox.innerText = `✅ Menyimpan rekaman otomatis...`;
        setTimeout(() => { stopRecording(); }, 500);
      }
    }

    // --- POSISI OBJEK DRAGGABLE ---
    let visW = 340;
    let visX = (width - visW) / 2;
    let visY = height - 160;

    // VARIABEL PIRINGAN HITAM VINYL
    let vinylRadius = 135;
    let vinylX = width - vinylRadius - 40;
    let vinylY = vinylRadius + 40;
    let vinylRot = 0;

    let smokeX = 150;
    let smokeY = height - 150;
    let isDraggingSmoke = false;
    let isDraggingVis = false;
    let isDraggingVinyl = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      let clientX = e.clientX;
      let clientY = e.clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      }
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function startDrag(e) {
      const pos = getMousePos(e);
      const distSmoke = Math.hypot(pos.x - smokeX, pos.y - smokeY);
      const sScale = parseFloat(document.getElementById('smokeSize').value);
      if (distSmoke <= Math.max(40, 30 * sScale)) {
        isDraggingSmoke = true;
        dragOffsetX = pos.x - smokeX;
        dragOffsetY = pos.y - smokeY;
        if (e.cancelable) e.preventDefault();
        return;
      }
      
      // Deteksi Piringan Hitam Berdasarkan Radius
      const distVinyl = Math.hypot(pos.x - vinylX, pos.y - vinylY);
      if (distVinyl <= vinylRadius) {
        isDraggingVinyl = true;
        dragOffsetX = pos.x - vinylX;
        dragOffsetY = pos.y - vinylY;
        if (e.cancelable) e.preventDefault();
        return;
      }

      if (pos.x >= visX && pos.x <= visX + visW && pos.y >= visY - 150 && pos.y <= visY + 150) {
        isDraggingVis = true;
        dragOffsetX = pos.x - visX;
        dragOffsetY = pos.y - visY;
        if (e.cancelable) e.preventDefault();
      }
    }

    function drag(e) {
      if (!isDraggingVis && !isDraggingVinyl && !isDraggingSmoke) return;
      const pos = getMousePos(e);
      if (isDraggingSmoke) {
        smokeX = pos.x - dragOffsetX;
        smokeY = pos.y - dragOffsetY;
        if (e.cancelable) e.preventDefault();
        return;
      }
      if (isDraggingVinyl) {
        vinylX = pos.x - dragOffsetX;
        vinylY = pos.y - dragOffsetY;
        if (e.cancelable) e.preventDefault();
        return;
      }
      if (isDraggingVis) {
        visX = pos.x - dragOffsetX;
        visY = pos.y - dragOffsetY;
        if (e.cancelable) e.preventDefault();
      }
    }

    function endDrag() {
      isDraggingVis = false;
      isDraggingVinyl = false;
      isDraggingSmoke = false;
    }
    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('mousemove', drag);
    window.addEventListener('mouseup', endDrag);
    canvas.addEventListener('touchstart', startDrag, { passive: false });
    canvas.addEventListener('touchmove', drag, { passive: false });
    window.addEventListener('touchend', endDrag);

    // --- AUDIO VARS ---
    let audioCtx, source, mediaStreamDestination, analyser, dataArray;
    let isAudioInit = false;
    let peakHeights = new Array(60).fill(0);

    function formatTime(seconds) {
      if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function initAudioContext() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.8;
      source = audioCtx.createMediaElementSource(audioPlayer);
      mediaStreamDestination = audioCtx.createMediaStreamDestination();
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      analyser.connect(mediaStreamDestination);
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      isAudioInit = true;
    }

    let isBgReady = false;
    let bgImageElement = new Image();
    document.getElementById('bgInput').addEventListener('change', function(e) {
      if (this.files[0]) {
        const file = this.files[0];
        if (file.type.startsWith('image/')) {
          const fileURL = URL.createObjectURL(file);
          bgImageElement.src = fileURL;
          bgImageElement.onload = () => {
            isBgReady = true;
            statusBox.innerText = "✅ Foto Latar Oke.";
          };
        } else {
          alert("Harap unggah file berbentuk Gambar/Foto (JPG, PNG).");
        }
      }
    });

    audioPlayer.addEventListener('loadedmetadata', () => {
      if (isFinite(audioPlayer.duration)) {
        durTimeEl.innerText = formatTime(audioPlayer.duration);
        progressBar.max = 100;
      }
    });

    audioPlayer.addEventListener('timeupdate', () => {
      if (isFinite(audioPlayer.duration) && durTimeEl.innerText === "00:00") {
        durTimeEl.innerText = formatTime(audioPlayer.duration);
      }
      if (!isDraggingProgress) {
        const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        progressBar.value = isNaN(percent) ? 0 : percent;
        currTimeEl.innerText = formatTime(audioPlayer.currentTime);
      }
    });

    progressBar.addEventListener('input', () => {
      isDraggingProgress = true;
      if (audioPlayer.duration) {
        const seekTime = (progressBar.value / 100) * audioPlayer.duration;
        currTimeEl.innerText = formatTime(seekTime);
        audioPlayer.currentTime = seekTime;
      }
    });
    const releaseSeek = () => { isDraggingProgress = false; };
    progressBar.addEventListener('change', releaseSeek);
    progressBar.addEventListener('touchend', releaseSeek);
    progressBar.addEventListener('mouseup', releaseSeek);

    function togglePlay() {
      if (!isTrackLoaded) {
        alert("Pilih Musik Dulu!");
        return;
      }
      if (!audioCtx) initAudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (audioPlayer.paused) {
        if (!audioPlayer.src || currentPlayIndex >= shuffledPlaylist.length) {
          playRandomSong(true);
        } else {
          audioPlayer.play();
          playBtn.innerText = "⏸ PAUSE";
          statusBox.innerText = `🎵 Lagu ${currentPlayIndex}/${audioFiles.length}: ${currentSongName}`;
        }
      } else {
        audioPlayer.pause();
        playBtn.innerText = "▶ RESUME";
        statusBox.innerText = "⏸ Musik Dijeda.";
      }
    }

    const config = {
      type: 'vintage',
      count: 100,
      visType: 'bw_oscilloscope',
      visHeight: 120,
      fxAngle: 0,
      fxSpeed: 1.0
    };

    document.getElementById('visType').addEventListener('change', (e) => config.visType = e.target.value);
    document.getElementById('type').addEventListener('change', (e) => config.type = e.target.value);
    document.getElementById('fxAngle').addEventListener('change', (e) => config.fxAngle = parseInt(e.target.value));
    document.getElementById('fxSpeed').addEventListener('input', (e) => config.fxSpeed = parseFloat(e.target.value));
    document.getElementById('count').addEventListener('input', (e) => config.count = parseInt(e.target.value));
    document.getElementById('visHeight').addEventListener('input', (e) => config.visHeight = parseInt(e.target.value));

    let time = 0;

    class RealisticFilmJitter {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = (Math.random() * width * 1.5) - (width * 0.25);
        this.y = (Math.random() * height * 1.5) - (height * 0.25);
        this.life = Math.random() * 5 + 2;
        this.alpha = Math.random() * 0.5 + 0.1;
        
        const rand = Math.random();
        if (rand < 0.05) {
          this.pType = 'scratch';
          this.length = Math.random() * height / 2 + 100;
          this.color = Math.random() > 0.5 ? `rgba(255,255,255,${this.alpha*0.6})` : `rgba(0,0,0,${this.alpha*0.8})`;
        } else if (rand < 0.15) {
          this.pType = 'hair';
          this.cp1x = (Math.random() - 0.5) * 50;
          this.cp1y = (Math.random() - 0.5) * 50;
          this.cp2x = (Math.random() - 0.5) * 50;
          this.cp2y = (Math.random() - 0.5) * 50;
          this.endX = (Math.random() - 0.5) * 60;
          this.endY = (Math.random() - 0.5) * 60;
          this.color = `rgba(0, 0, 0, ${this.alpha * 1.2})`;
        } else {
          this.pType = 'dust';
          this.radius = Math.random() * 2 + 0.5;
          this.color = Math.random() > 0.6 ? `rgba(0,0,0,${this.alpha})` : `rgba(255,255,255,${this.alpha*0.6})`;
        }
      }
      update() {
        this.life -= config.fxSpeed;
        if (this.life <= 0) this.reset();
      }
      draw() {
        if (config.type === 'none') return;
        
        let showDustHair = config.type === 'grain' || config.type === 'vintage';
        let showScratch = config.type === 'scratch' || config.type === 'vintage';
        
        ctx.save();
        ctx.translate(this.x, this.y);
        if (config.fxAngle !== 0) ctx.rotate(config.fxAngle * Math.PI / 180);
        
        if (this.pType === 'dust' && showDustHair) {
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(0, 0, this.radius, 0, Math.PI*2);
          ctx.fill();
        } else if (this.pType === 'hair' && showDustHair) {
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 1 + Math.random();
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.bezierCurveTo(this.cp1x, this.cp1y, this.cp2x, this.cp2y, this.endX, this.endY);
          ctx.stroke();
        } else if (this.pType === 'scratch' && showScratch) {
          ctx.strokeStyle = this.color;
          ctx.lineWidth = Math.random() * 1.5 + 0.5;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          let currentY = 0;
          let currentX = 0;
          for (let i = 0; i < this.length; i += 15) {
            currentY += 15;
            currentX += (Math.random() - 0.5) * 2; 
            ctx.lineTo(currentX, currentY);
          }
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    let particles = [];
    for (let i = 0; i < 400; i++) particles.push(new RealisticFilmJitter());

    function getSymmetricVal(index, totalBars, bufferLen) {
      try {
        if (!dataArray) return 0;
        const center = totalBars / 2;
        const centerDist = Math.abs(index - center) / center;
        const dataIdx = Math.floor(centerDist * (bufferLen / 3));
        return dataArray[dataIdx] / 255;
      } catch (e) { return 0; }
    }

    function drawVisualizer(bufferLen) {
      const style = config.visType;
      ctx.save();
      ctx.translate(visX, visY);
      
      try {
        if (style === 'bw_oscilloscope') {
          ctx.beginPath();
          ctx.moveTo(0, 0);
          for (let i = 0; i <= visW; i += 5) {
             let h = getSymmetricVal(i, visW, bufferLen) * config.visHeight;
             ctx.lineTo(i, -h);
          }
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2.5;
          ctx.shadowBlur = 8;
          ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
          ctx.stroke();
          ctx.shadowBlur = 0; 
        } 
        else if (style === 'zebra_bars') {
          const numBars = 32;
          const spacing = visW / numBars;
          const barW = spacing * 0.7;
          const stripeH = 6;
          for (let i = 0; i < numBars; i++) {
            const h = Math.max(0, getSymmetricVal(i, numBars, bufferLen) * config.visHeight);
            const stripes = Math.floor(h / stripeH);
            for (let j = 0; j < stripes; j++) {
              ctx.fillStyle = j % 2 === 0 ? 'rgba(255, 255, 255, 0.9)' : 'rgba(20, 20, 20, 0.9)';
              ctx.fillRect(i * spacing, -(j * stripeH) - stripeH, barW, stripeH);
            }
          }
        }
        else if (style === 'ghost_blocks') {
          const numBars = 32;
          const spacing = visW / numBars;
          const barW = spacing * 0.8;
          const blockH = 8;
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.lineWidth = 1.5;
          for (let i = 0; i < numBars; i++) {
            const h = Math.max(0, getSymmetricVal(i, numBars, bufferLen) * config.visHeight);
            const blocks = Math.floor(h / blockH);
            for (let j = 0; j < blocks; j++) {
              ctx.strokeRect(i * spacing, -(j * blockH) - blockH + 1, barW, blockH - 2);
            }
          }
        }
        else if (style === 'winamp_peaks') {
          const numBars = 40;
          const spacing = visW / numBars;
          const barW = spacing * 0.7;
          for (let i = 0; i < numBars; i++) {
            const h = Math.max(0, getSymmetricVal(i, numBars, bufferLen) * config.visHeight);
            if (h >= peakHeights[i]) { peakHeights[i] = h; } 
            else {
              peakHeights[i] -= 1.5;
              if (peakHeights[i] < 0) peakHeights[i] = 0;
            }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillRect(i * spacing, -h / 2, barW, h);
            ctx.fillStyle = 'rgba(255, 255, 255, 1)';
            ctx.fillRect(i * spacing, -peakHeights[i] / 2 - 4, barW, 3);
            ctx.fillRect(i * spacing, peakHeights[i] / 2 + 1, barW, 3);
          }
        } else if (style === 'retro_led') {
          const numBars = 32;
          const segments = 12;
          const spacing = visW / numBars;
          const barW = spacing * 0.7;
          const segH = (config.visHeight / segments) / 2;
          for (let i = 0; i < numBars; i++) {
            const hVal = getSymmetricVal(i, numBars, bufferLen);
            const activeSegs = Math.floor(hVal * segments);
            for (let s = 0; s < segments; s++) {
              if (s < activeSegs) {
                if (s > segments * 0.75) ctx.fillStyle = '#ff3b3b'; 
                else if (s > segments * 0.45) ctx.fillStyle = '#ffc107'; 
                else ctx.fillStyle = '#00e676'; 
                ctx.fillRect(i * spacing, -(s * segH * 2) - 4, barW, segH * 1.5);
                ctx.fillRect(i * spacing, (s * segH * 2) + 4, barW, segH * 1.5);
              } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)'; 
                ctx.fillRect(i * spacing, -(s * segH * 2) - 4, barW, segH * 1.5);
                ctx.fillRect(i * spacing, (s * segH * 2) + 4, barW, segH * 1.5);
              }
            }
          }
        } else if (style === 'wireframe_bars') {
          const numBars = 36;
          const spacing = visW / numBars;
          const barW = spacing * 0.8;
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
          ctx.lineWidth = 1.5;
          for (let i = 0; i < numBars; i++) {
            const h = Math.max(6, getSymmetricVal(i, numBars, bufferLen) * config.visHeight);
            ctx.strokeRect(i * spacing, -h / 2, barW, h);
            ctx.beginPath();
            ctx.moveTo(i * spacing, 0);
            ctx.lineTo(i * spacing + barW, 0);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
          }
        } else if (style === 'classic_bars') {
          const numBars = 40;
          const spacing = visW / numBars;
          const barW = spacing * 0.6;
          ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
          for (let i = 0; i < numBars; i++) {
            const h = Math.max(4, getSymmetricVal(i, numBars, bufferLen) * config.visHeight);
            ctx.fillRect(i * spacing, -h / 2, barW, h);
          }
        } else if (style === 'peak_dots') {
          const numBars = 36;
          const spacing = visW / numBars;
          ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
          ctx.fillRect(0, 0, visW, 2);
          for (let i = 0; i < numBars; i++) {
            const h = getSymmetricVal(i, numBars, bufferLen) * (config.visHeight / 2);
            const x = i * spacing + (spacing / 2);
            if (h > 8) {
              ctx.fillRect(x, -h, 2, h);
              ctx.fillRect(x - 2, -h - 4, 6, 4);
              ctx.fillRect(x, 0, 2, h);
              ctx.fillRect(x - 2, h, 6, 4);
            }
          }
        } else if (style === 'split_bars') {
          const numBars = 40;
          const spacing = visW / numBars;
          const barW = spacing * 0.6;
          ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
          ctx.fillRect(0, -1, visW, 3);
          for (let i = 0; i < numBars; i++) {
            const h = Math.max(3, getSymmetricVal(i, numBars, bufferLen) * (config.visHeight / 2));
            ctx.fillRect(i * spacing, -h - 8, barW, h);
            ctx.fillRect(i * spacing, 8, barW, h);
          }
        } else if (style === 'step_blocks') {
          const numBars = 30;
          const spacing = visW / numBars;
          const barW = spacing - 2;
          ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
          for (let i = 0; i < numBars; i++) {
            const stepVal = Math.floor(getSymmetricVal(i, numBars, bufferLen) * 5) / 5;
            const h = Math.max(6, stepVal * config.visHeight);
            ctx.fillRect(i * spacing, -h / 2, barW, h);
          }
        }
      } catch (e) {}
      ctx.restore();
    }

    // --- MENGGAMBAR PIRINGAN HITAM MENGKILAP ---
    function drawVinyl() {
      ctx.save();
      ctx.translate(vinylX, vinylY);

      if (!audioPlayer.paused) { vinylRot += 0.02; }

      // 1. Bayangan Piringan
      ctx.beginPath(); 
      ctx.arc(5, 5, vinylRadius, 0, Math.PI * 2); 
      ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; 
      ctx.fill();

      // 2. Base Piringan Hitam Murni
      ctx.beginPath(); 
      ctx.arc(0, 0, vinylRadius, 0, Math.PI * 2); 
      ctx.fillStyle = "#0a0a0a"; 
      ctx.fill();

      // 3. Efek Pantulan Cahaya Mengkilap (Statis)
      let shine1 = ctx.createLinearGradient(-vinylRadius, -vinylRadius, vinylRadius, vinylRadius);
      shine1.addColorStop(0, 'rgba(255,255,255,0.25)');
      shine1.addColorStop(0.2, 'rgba(255,255,255,0)');
      shine1.addColorStop(0.8, 'rgba(255,255,255,0)');
      shine1.addColorStop(1, 'rgba(255,255,255,0.15)');
      ctx.beginPath(); ctx.arc(0, 0, vinylRadius, 0, Math.PI * 2);
      ctx.fillStyle = shine1; ctx.fill();

      let shine2 = ctx.createLinearGradient(vinylRadius, -vinylRadius, -vinylRadius, vinylRadius);
      shine2.addColorStop(0, 'rgba(255,255,255,0.15)');
      shine2.addColorStop(0.3, 'rgba(255,255,255,0)');
      shine2.addColorStop(0.7, 'rgba(255,255,255,0)');
      shine2.addColorStop(1, 'rgba(255,255,255,0.25)');
      ctx.beginPath(); ctx.arc(0, 0, vinylRadius, 0, Math.PI * 2);
      ctx.fillStyle = shine2; ctx.fill();

      // 4. Rotasi Khusus Elemen Alur & Label
      ctx.rotate(vinylRot);

      // Alur Lagu (Grooves)
      ctx.strokeStyle = "rgba(255, 255, 255, 0.06)";
      ctx.lineWidth = 1;
      for (let r = 45; r < vinylRadius - 5; r += 4) {
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
      }

      // Label Piringan Tengah
      ctx.beginPath(); ctx.arc(0, 0, 42, 0, Math.PI * 2);
      ctx.fillStyle = '#8b0000'; 
      ctx.fill();

      ctx.beginPath(); ctx.arc(0, 0, 39, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffd700'; 
      ctx.lineWidth = 1.5; ctx.stroke();

      // Teks Label Vintage
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center'; 
      ctx.textBaseline = 'middle';
      ctx.fillText("VINTAGE", 0, -12);
      
      ctx.font = '9px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText("STEREO", 0, 14);

      // Lubang Pemutar Tengah
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#111'; ctx.fill();

      ctx.restore();
    }

    // --- ASAP ---
    function drawPureAnimatedVectorSmoke() {
      let smokeScale = parseFloat(document.getElementById('smokeSize').value);
      ctx.save();
      ctx.translate(smokeX, smokeY);
      ctx.scale(smokeScale, smokeScale);
      
      function drawBranch(height, maxW, waveFreq, speedMult, xOffsetBase) {
        let points = [];
        let steps = 50;
        for (let i = 0; i <= steps; i++) {
          let prog = i / steps;
          let w = Math.sin(prog * Math.PI) * maxW;
          if (prog > 0.6) w *= Math.pow(1 - prog + 0.05, 0.6);
          let speed = time * speedMult;
          let envelope = Math.pow(prog, 0.8);
          let x = Math.sin(prog * Math.PI * waveFreq - speed) * 50 * envelope;
          x += xOffsetBase * prog;
          let y = -prog * height;
          points.push({ x, y, w });
        }
        function drawPolygon(widthMult, offsetX, color) {
          ctx.beginPath();
          for (let i = 0; i < points.length; i++) {
            let px = points[i].x + offsetX - (points[i].w * widthMult);
            if (i === 0) ctx.moveTo(px, points[i].y);
            else ctx.lineTo(px, points[i].y);
          }
          for (let i = points.length - 1; i >= 0; i--) {
            let px = points[i].x + offsetX + (points[i].w * widthMult);
            ctx.lineTo(px, points[i].y);
          }
          ctx.closePath();
          ctx.fillStyle = color;
          ctx.fill();
        }
        drawPolygon(1.4, 0, 'rgba(180, 185, 190, 0.15)');
        drawPolygon(1.0, 0, 'rgba(220, 225, 230, 0.25)');
        drawPolygon(0.35, -maxW * 0.25, 'rgba(255, 255, 255, 0.3)');
      }
      drawBranch(380, 10, 2.0, 4.0, 0);
      drawBranch(250, 5, 2.5, 3.2, -20);
      drawBranch(200, 4, 3.0, 3.5, 25);
      ctx.restore();
    }

    // --- ANIMASI UTAMA ---
    function animate() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
      time += (0.05 * config.fxSpeed); 

      ctx.save();
      
      // Gate Weave
      if (config.type !== 'none') {
        const jitterX = (Math.random() - 0.5) * 1.5;
        const jitterY = (Math.random() - 0.5) * 1.5;
        ctx.translate(jitterX, jitterY);
      }

      // Background
      if (isBgReady) {
        const scale = Math.max(width / bgImageElement.width, height / bgImageElement.height);
        const x = (width / 2) - (bgImageElement.width / 2) * scale;
        const y = (height / 2) - (bgImageElement.height / 2) * scale;
        ctx.drawImage(bgImageElement, x, y, bgImageElement.width * scale, bgImageElement.height * scale);
      }
      
      if (config.type !== 'none') {
        ctx.fillStyle = "rgba(10, 5, 0, 0.1)"; 
        ctx.fillRect(-10, -10, width+20, height+20);
      }

      // Visualizer
      if (isAudioInit && currentObjectUrl) {
        if (!audioPlayer.paused) {
          analyser.getByteFrequencyData(dataArray);
        } else {
          for (let i = 0; i < dataArray.length; i++) {
            dataArray[i] = Math.max(0, dataArray[i] - 10);
          }
        }
        drawVisualizer(analyser.frequencyBinCount);
      }

      // Objek
      drawVinyl();
      drawPureAnimatedVectorSmoke();

      // Film FX
      for (let i = 0; i < config.count; i++) {
        if (particles[i]) {
          particles[i].update();
          particles[i].draw();
        }
      }

      // Vignette
      if (config.type !== 'none') {
        const grad = ctx.createRadialGradient(width/2, height/2, height*0.35, width/2, height/2, width*0.7);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.6)');
        ctx.fillStyle = grad;
        ctx.fillRect(-10, -10, width+20, height+20);
      }

      ctx.restore();
      requestAnimationFrame(animate);
    }
    animate();

    // --- LOGIKA MEREKAM (DENGAN TOMBOL DOWNLOAD KEREN) ---
    let mediaRecorder, chunks = [];
    let recordStartTime = 0;

    function startCountdownAndRecord() {
      if (!isAudioInit || !currentObjectUrl) {
        alert("Pilih dan siapkan musik dulu!");
        return;
      }
      if (isCountingDown) {
        clearInterval(countdownTimer);
        isCountingDown = false;
        countdownOverlay.style.display = 'none';
        recordBtn.innerText = "🔴 MULAI REKAM 720p";
        return;
      }
      isCountingDown = true;
      let counter = 3;
      countdownOverlay.innerText = counter;
      countdownOverlay.style.display = 'block';
      recordBtn.innerText = "❌ BATALKAN REKAM (" + counter + ")";
      countdownTimer = setInterval(() => {
        counter--;
        if (counter > 0) {
          countdownOverlay.innerText = counter;
          recordBtn.innerText = "❌ BATALKAN REKAM (" + counter + ")";
        } else {
          clearInterval(countdownTimer);
          isCountingDown = false;
          countdownOverlay.style.display = 'none';
          executeRecording();
        }
      }, 1000);
    }

    function executeRecording() {
      if (!audioCtx) initAudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.KeepAwake) {
        window.Capacitor.Plugins.KeepAwake.keepAwake();
      }
      
      audioPlayer.play();
      playBtn.innerText = "⏸ PAUSE";
      stopOverlay.style.display = 'block';
      statusBox.innerText = "🔴 Merekam Video 720p...";
      recordBtn.innerText = "🔴 SEDANG MEREKAM";
      
      const stream = canvas.captureStream(30);
      const combined = new MediaStream([...stream.getVideoTracks(), mediaStreamDestination.stream.getAudioTracks()[0]]);
      
      let options = { mimeType: 'video/webm;codecs=vp8,opus' };
      if (!MediaRecorder.isTypeSupported(options.mimeType)) {
        options = { mimeType: 'video/webm' };
      }
      
      try {
        mediaRecorder = new MediaRecorder(combined, options);
      } catch (e) {
        mediaRecorder = new MediaRecorder(combined);
      }
      
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) chunks.push(e.data);
      };
      mediaRecorder.onstop = saveVideoWebM;
      chunks = [];
      recordStartTime = Date.now();
      mediaRecorder.start(1000);
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.KeepAwake) {
        window.Capacitor.Plugins.KeepAwake.allowSleep();
      }
      
      audioPlayer.pause();
      playBtn.innerText = "▶ PLAY";
      stopOverlay.style.display = 'none';
      recordBtn.innerText = "🔴 MULAI REKAM 720p";
      statusBox.innerText = "Menyiapkan file video...";
      if (playTimeout) clearTimeout(playTimeout);
    }

    function saveVideoWebM() {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const recordDuration = Date.now() - recordStartTime;
      statusBox.innerText = "⏳ Menjahit durasi (Biar bisa di-skip)...";
      
      if (typeof ysFixWebmDuration === 'function') {
        ysFixWebmDuration(blob, recordDuration, function(fixedBlob) {
          triggerDownload(fixedBlob);
        });
      } else {
        triggerDownload(blob);
      }
    }

    function triggerDownload(finalBlob) {
      statusBox.innerText = "⏳ Memproses pemotongan file video...";
      const url = URL.createObjectURL(finalBlob);
      
      const oldVid = document.getElementById('previewVid'); if(oldVid) oldVid.remove();
      const oldBtn = document.getElementById('shareBtnDewa'); if(oldBtn) oldBtn.remove();
      
      const vid = document.createElement('video'); vid.id = 'previewVid'; vid.src = url; vid.controls = true;
      vid.setAttribute('controlsList', 'nodownload'); vid.style.width = "100%"; vid.style.marginTop = "20px"; vid.style.border = "3px solid #00d2ff"; vid.style.borderRadius = "8px";
      
      const saveBtn = document.createElement('button'); saveBtn.id = 'shareBtnDewa'; saveBtn.innerText = "📥 SIMPAN VIDEO KE HP / PC";
      saveBtn.style.width = "100%"; saveBtn.style.padding = "15px"; saveBtn.style.marginTop = "10px";
      saveBtn.style.background = "linear-gradient(135deg, #00ffaa, #00bcd4)"; saveBtn.style.color = "black"; saveBtn.style.border = "none"; saveBtn.style.borderRadius = "8px"; saveBtn.style.fontWeight = "bold"; saveBtn.style.fontSize = "14px"; saveBtn.style.cursor = "pointer";
      
      let isSaving = false;
      saveBtn.onclick = async () => {
        if (isSaving) return; isSaving = true;
        saveBtn.innerText = "⏳ MEMULAI PROSES SIMPAN...";
        try {
          if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Filesystem) {
            const FS = window.Capacitor.Plugins.Filesystem;
            const fileName = `Lova_Vinyl_720p_${Date.now()}.webm`;
            await FS.writeFile({ path: fileName, data: "", directory: 'DOCUMENTS' });
            
            const chunkSize = 1572864; 
            const totalChunks = Math.ceil(finalBlob.size / chunkSize);
            for (let i = 0; i < totalChunks; i++) {
              const start = i * chunkSize; const end = Math.min(start + chunkSize, finalBlob.size); const chunk = finalBlob.slice(start, end);
              const base64Chunk = await new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.onload = () => resolve(reader.result.split(',')[1]); reader.onerror = reject; reader.readAsDataURL(chunk);
              });
              await FS.appendFile({ path: fileName, data: base64Chunk, directory: 'DOCUMENTS' });
              const percent = Math.round(((i + 1) / totalChunks) * 100);
              statusBox.innerText = `⏳ Menulis ke memori HP... ${percent}%`; saveBtn.innerText = `⏳ MENYIMPAN... ${percent}%`;
            }
            saveBtn.innerText = "✅ TERSIMPAN DI DOCUMENTS HP!"; statusBox.innerText = `🎉 SUKSES! Video otomatis tersimpan di folder Documents!`;
          } else {
            statusBox.innerText = "⏳ Mengunduh lewat Browser...";
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `Lova_Vinyl_720p_${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); }, 100);

            saveBtn.innerText = "✅ VIDEO SUKSES DIUNDUH!";
            statusBox.innerText = `🎉 SUKSES! Video berhasil diunduh ke perangkat Anda.`;
          }
        } catch(e) {
          saveBtn.innerText = "❌ GAGAL MENYIMPAN"; statusBox.innerText = "Terjadi Error: " + e.message; isSaving = false;
        }
      };
      
      const controlsDiv = document.getElementById('controls'); controlsDiv.appendChild(vid); controlsDiv.appendChild(saveBtn);
      saveBtn.scrollIntoView({ behavior: 'smooth' });

      // Auto klik
      setTimeout(() => { if(!isSaving) saveBtn.click(); }, 1500);
    }
  </script>
