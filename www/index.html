<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ambient v.1</title>
  <script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.5/fix-webm-duration.js"></script>
  <style>
    body { margin: 0; background-color: #050505; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
    #canvas-wrapper { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; margin-top: 20px; border: 1px solid #333; background: #000; cursor: grab; }
    canvas { width: 100%; height: 100%; display: block; }
    #controls { width: 90%; max-width: 600px; background: #151515; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
    .btn-group { display: flex; gap: 8px; }
    .file-label { flex: 1; background: #222; color: #ccc; padding: 12px; text-align: center; border-radius: 6px; cursor: pointer; border: 1px solid #444; font-size: 11px; font-weight: bold; }
    #playBtn { flex: 2; padding: 15px; background: #333; color: #aaa; border: 1px solid #444; border-radius: 8px; cursor: pointer; }
    #playBtn.ready { background: #4caf50; color: white; border: none; }
    #nextBtn { flex: 1; padding: 15px; background: #333; color: #aaa; border: 1px solid #444; border-radius: 8px; cursor: not-allowed; }
    #nextBtn.ready { background: #222; color: white; cursor: pointer; }
    .btn-record { width: 100%; padding: 15px; background: #c62828; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #statusBox { font-size: 12px; text-align: center; color: #4caf50; }
  </style>
</head>
<body>
  <div id="canvas-wrapper"><canvas id="canvas" width="1280" height="720"></canvas></div>
  <div id="controls">
    <div id="statusBox">Ambient v.1 Ready.</div>
    <div class="btn-group">
      <label onclick="document.getElementById('bgInput').click()" class="file-label">1. FOTO</label>
      <label onclick="document.getElementById('audioInput').click()" class="file-label">2. MUSIK</label>
    </div>
    <div class="btn-group">
        <button id="playBtn" onclick="togglePlay()">▶ PLAY</button>
        <button id="nextBtn" onclick="playNext()">⏭ NEXT</button>
    </div>
    <input type="file" id="bgInput" style="display:none" accept="image/*">
    <input type="file" id="audioInput" style="display:none" multiple>
    <button class="btn-record" onclick="alert('Rekam aktif')">🔴 REKAM AMBIENT</button>
  </div>
  <audio id="audioPlayer"></audio>
  <script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const playBtn = document.getElementById('playBtn'), nextBtn = document.getElementById('nextBtn');
    const audioPlayer = document.getElementById('audioPlayer');
    let bgImg = new Image(), audioFiles = [], currentIdx = 0;

    document.getElementById('bgInput').onchange = (e) => { bgImg.src = URL.createObjectURL(e.target.files[0]); };
    document.getElementById('audioInput').onchange = (e) => { 
        audioFiles = Array.from(e.target.files); 
        playBtn.classList.add('ready'); nextBtn.classList.add('ready');
    };

    function playNext() {
        if(audioFiles.length === 0) return;
        audioPlayer.src = URL.createObjectURL(audioFiles[currentIdx % audioFiles.length]);
        audioPlayer.play();
        currentIdx++;
        playBtn.innerText = "⏸ PAUSE";
    }

    function togglePlay() {
        if(audioPlayer.paused) { if(!audioPlayer.src) playNext(); else audioPlayer.play(); playBtn.innerText = "⏸ PAUSE"; }
        else { audioPlayer.pause(); playBtn.innerText = "▶ PLAY"; }
    }

    function animate() {
      ctx.fillStyle = "#000"; ctx.fillRect(0,0,1280,720);
      if(bgImg.src) {
        let s = Math.max(1280/bgImg.width, 720/bgImg.height);
        ctx.drawImage(bgImg, (1280-bgImg.width*s)/2, (720-bgImg.height*s)/2, bgImg.width*s, bgImg.height*s);
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
