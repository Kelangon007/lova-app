<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lova Fav: Nature Ambient 720p</title>
  <script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.5/fix-webm-duration.js"></script>
  <style>
    body { margin: 0; background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%); background-size: 20px 20px; background-color: #222; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; touch-action: pan-y; }
    #canvas-wrapper { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; margin-top: 20px; border: 1px solid rgba(255, 255, 255, 0.15); background: #000; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9); cursor: grab; }
    #canvas-wrapper:active { cursor: grabbing; }
    canvas { width: 100%; height: 100%; display: block; }
    #controls { width: 90%; max-width: 600px; background: #191919; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #333; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); }
    .btn-group, .play-group { display: flex; gap: 8px; }
    .file-label { flex: 1; background: #252525; color: #aaa; padding: 12px 5px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; border: 1px solid #3c3c3c; transition: 0.2s; white-space: nowrap; }
    .file-label:hover { background: #333; color: white; }
    #playBtn { flex: 2; padding: 15px; background: #2a2a2a; color: #666; border: 1px solid #1a1a1a; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    #playBtn.ready { background: linear-gradient(135deg, #a8ff78, #78ffd6); color: #111; border: none; }
    #nextBtn { flex: 1; padding: 15px; background: #333; color: #777; border: 1px solid #222; border-radius: 8px; font-weight: bold; cursor: not-allowed; transition: 0.3s; }
    #nextBtn.ready { background: #252525; color: white; border: 1px solid #444; cursor: pointer; }
    .progress-container { display: flex; align-items: center; gap: 10px; background: #202020; padding: 8px; border-radius: 6px; border: 1px solid #2d2d2d; }
    .time-text { font-size: 11px; font-family: monospace; color: #a8ff78; min-width: 40px; text-align: center; }
    #progressBar { flex: 1; height: 5px; -webkit-appearance: none; background: #333; border-radius: 5px; cursor: pointer; }
    #progressBar::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #78ffd6; border-radius: 50%; cursor: pointer; }
    .btn-record { width: 100%; padding: 15px; background: linear-gradient(135deg, #1b5e20, #0d47a1); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #stopOverlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(13, 71, 161, 0.95); color: white; padding: 15px 30px; border-radius: 50px; z-index: 100; font-weight: bold; border: 3px solid white; cursor: pointer; }
    #countdownOverlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: bold; color: white; text-shadow: 0 0 20px rgba(0, 0, 0, 0.8); z-index: 100; }
    #statusBox { font-size: 12px; text-align: center; color: #a8ff78; margin-bottom: 5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row { display: flex; align-items: center; gap: 10px; }
    label { font-size: 11px; width: 80px; color: #ccc; font-weight: 600; }
    input[type="range"], select { flex: 1; height: 36px; background: #202020; color: white; border: 1px solid #3c3c3c; border-radius: 6px; }
    input[type="file"] { display: none; }
  </style>
</head>

<body>

  <div id="canvas-wrapper">
    <canvas id="canvas" width="1280" height="720"></canvas>
    <div id="countdownOverlay">3</div>
    <div id="stopOverlay" onclick="stopRecording()">⏹ STOP & SIMPAN</div>
  </div>

  <div id="controls">
    <div id="statusBox">Siap Cetak Audio Alam Sinematik 720p. Silakan Upload.</div>
    <div class="btn-group">
      <label for="bgInput" class="file-label" style="border-bottom: 3px solid #a8ff78">1. FOTO LATAR</label>
      <label for="audioInput" class="file-label" style="border-bottom: 3px solid #78ffd6">2. MUSIK AMBIENT</label>
    </div>

    <div class="play-group">
      <button id="playBtn" onclick="togglePlay()">⚠ PUTAR MUSIK</button>
      <button id="nextBtn" onclick="playRandomSong(false)">⏭ NEXT</button>
    </div>

    <div class="progress-container">
      <span id="currTime" class="time-text">00:00</span>
      <input type="range" id="progressBar" value="0" min="0" step="0.1">
      <span id="durTime" class="time-text">00:00</span>
    </div>

    <input type="file" id="bgInput" accept="image/*">
    <input type="file" id="audioInput" accept="audio/*" multiple>

    <hr style="border: 0; border-top: 1px solid #333; width: 100%; margin: 5px 0;">

    <div class="row">
      <label style="color:#a8ff78;">SPECTRUM ALAM</label>
      <select id="visType">
        <option value="organic_wave">〰️ Organic Wave (Riak Air Danau)</option>
        <option value="river_ripple">🌊 River Ripple (Aliran Sungai Simetris)</option>
        <option value="mountain_peaks">⛰️ Mountain Peaks (Siluet Gunung)</option>
        <option value="forest_canopy">🌲 Forest Canopy (Pohon Tumbuh)</option>
        <option value="glowing_embers">✨ Glowing Embers (Gelembung Hangat)</option>
        <option value="hanging_vines">🌿 Hanging Vines (Akar Menggantung)</option>
        <option value="ocean_horizon">🌅 Ocean Horizon (Cakrawala Samudra)</option>
        <option value="moon_halo">🌕 Moon Halo (Halo Bulan Terang)</option>
        <option value="bamboo_forest">🎋 Bamboo Forest (Hutan Bambu)</option>
        <option value="starlight_pulse">⭐ Starlight Pulse (Denyut Bintang)</option>
      </select>
    </div>

    <div class="row"><label>TINGGI SPECTRUM</label><input type="range" id="visHeight" min="30" max="600" value="180"></div>

    <hr style="border: 0; border-top: 1px dashed #333; width: 100%; margin: 5px 0;">

    <div class="row">
      <label style="color:#78ffd6;">EFEK CUACA</label>
      <select id="fxType">
        <option value="none">🚫 Tanpa Efek</option>
        <option value="realistic_rain">🌧️ Ultra Realistic Rain (Splatters & Dimensi)</option>
        <option value="soft_snow">❄️ Soft Snow (Fisika Salju Melayang)</option>
        <option value="falling_leaves">🍁 Falling Leaves (Putaran Daun 3D Real)</option>
        <option value="forest_fireflies">✨ Forest Fireflies (Kunang-Kunang Hutan)</option>
      </select>
    </div>
    
    <div class="row"><label>TIUPAN ANGIN</label><input type="range" id="fxSpeed" min="0.1" max="4.0" step="0.1" value="1.0"></div>
    <div class="row"><label>KEPADATAN PARTIKEL</label><input type="range" id="fxCount" min="10" max="800" step="10" value="150"></div>

  </div>

  <audio id="audioPlayer" crossorigin="anonymous"></audio>

  <script>
    const statusBox = document.getElementById('statusBox');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d'); 
    
    const audioPlayer = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const nextBtn = document.getElementById('nextBtn');
    const stopOverlay = document.getElementById('stopOverlay');
    const countdownOverlay = document.getElementById('countdownOverlay');
    const recordBtn = document.getElementById('recordBtn');
    const progressBar = document.getElementById('progressBar');
    const currTimeEl = document.getElementById('currTime');
    const durTimeEl = document.getElementById('durTime');
    let isDraggingProgress = false;
    const width = 1280;
    const height = 720;
    
    let audioFiles = []; let currentObjectUrl = null; let currentSongName = ""; let playTimeout = null;
    let isTrackLoaded = false; let shuffledPlaylist = []; let currentPlayIndex = 0; let isCountingDown = false; let countdownTimer = null;

    function formatTime(seconds) {
      if (isNaN(seconds)) return "00:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; }
      return array;
    }
    
    document.getElementById('audioInput').addEventListener('change', function(e) {
      if (this.files.length > 0) {
        audioFiles = Array.from(this.files); isTrackLoaded = true; shuffledPlaylist = shuffle(Array.from({ length: audioFiles.length }, (v, k) => k));
        currentPlayIndex = 0; playBtn.innerHTML = "▶ PLAY MUSIK"; playBtn.classList.add('ready'); nextBtn.classList.add('ready');
        statusBox.innerText = `${audioFiles.length} Musik dimuat. Siap diputar!`; progressBar.value = 0; currTimeEl.innerText = "00:00"; durTimeEl.innerText = "00:00";
        audioPlayer.pause(); if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl); currentObjectUrl = null; currentSongName = "Musik Diunggah";
      }
    });

    function playRandomSong(isInstant = false) {
      if (audioFiles.length === 0) return;
      if (playTimeout) clearTimeout(playTimeout);
      if (currentPlayIndex >= shuffledPlaylist.length) { currentPlayIndex = 0; stopEverything(); return; }
      if (currentObjectUrl && isInstant) { URL.revokeObjectURL(currentObjectUrl); currentObjectUrl = null; }
      const delayAmount = isInstant ? 0 : 3500;
      if (!isInstant) {
        audioPlayer.pause(); playBtn.innerText = "⏳ TUNGGU..."; statusBox.innerText = "⏳ Jeda pergantian musik...";
        currentSongName = "Memuat..."; progressBar.value = 0; currTimeEl.innerText = "00:00"; durTimeEl.innerText = "00:00";
      }
      playTimeout = setTimeout(() => {
        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
        const actualFileIndex = shuffledPlaylist[currentPlayIndex]; const selectedFile = audioFiles[actualFileIndex];
        currentSongName = selectedFile.name.replace(/\.[^/.]+$/, ""); currentObjectUrl = URL.createObjectURL(selectedFile);
        audioPlayer.src = currentObjectUrl; audioPlayer.load();
        if (!audioCtx) initAudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
        audioPlayer.play().then(() => { playBtn.innerText = "⏸ PAUSE"; statusBox.innerText = `🎵 Musik ${currentPlayIndex + 1}/${audioFiles.length}: ${currentSongName}`; currentPlayIndex++; }).catch(err => { playBtn.innerText = "❌ ERROR"; });
      }, delayAmount);
    }
    
    audioPlayer.addEventListener('ended', () => { playRandomSong(false); });

    function stopEverything() {
      audioPlayer.pause(); if (playTimeout) clearTimeout(playTimeout);
      if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl); currentObjectUrl = null; currentSongName = "Playlist Selesai";
      if (dataArray) dataArray.fill(0); shuffledPlaylist = shuffle(Array.from({ length: audioFiles.length }, (v, k) => k));
      statusBox.innerText = `✅ Semua musik selesai diputar.`; playBtn.innerText = "▶ PLAY ACAK"; progressBar.value = 0; currTimeEl.innerText = "00:00"; durTimeEl.innerText = "00:00";
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        statusBox.innerText = `✅ Durasi habis! Memproses simpan otomatis...`; setTimeout(() => { stopRecording(); }, 500);
      }
    }
    
    let visW = 500; let visX = (width - visW) / 2; let visY = height - 150;
    let isDraggingVis = false; let dragOffsetX = 0; let dragOffsetY = 0;

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
      let clientX = e.clientX; let clientY = e.clientY;
      if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
      return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function startDrag(e) {
      const pos = getMousePos(e);
      if (pos.x >= visX && pos.x <= visX + visW && pos.y >= visY - 150 && pos.y <= visY + 150) { isDraggingVis = true; dragOffsetX = pos.x - visX; dragOffsetY = pos.y - visY; if (e.cancelable) e.preventDefault(); }
    }
    function drag(e) {
      if (!isDraggingVis) return; const pos = getMousePos(e); visX = pos.x - dragOffsetX; visY = pos.y - dragOffsetY; if (e.cancelable) e.preventDefault();
    }
    function endDrag() { isDraggingVis = false; }
    
    canvas.addEventListener('mousedown', startDrag); canvas.addEventListener('mousemove', drag); window.addEventListener('mouseup', endDrag);
    canvas.addEventListener('touchstart', startDrag, { passive: false }); canvas.addEventListener('touchmove', drag, { passive: false }); window.addEventListener('touchend', endDrag);
    
    let audioCtx, source, mediaStreamDestination, analyser, dataArray;
    let isAudioInit = false;

    function initAudioContext() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser(); analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.85;
      source = audioCtx.createMediaElementSource(audioPlayer); mediaStreamDestination = audioCtx.createMediaStreamDestination();
      source.connect(analyser); analyser.connect(audioCtx.destination); analyser.connect(mediaStreamDestination);
      dataArray = new Uint8Array(analyser.frequencyBinCount); isAudioInit = true;
    }
    
    let isBgReady = false; let bgImageElement = new Image();
    document.getElementById('bgInput').addEventListener('change', function(e) {
      if (this.files[0]) {
        const file = this.files[0];
        if (file.type.startsWith('image/')) {
          const fileURL = URL.createObjectURL(file); bgImageElement.src = fileURL;
          bgImageElement.onload = () => { isBgReady = true; statusBox.innerText = "✅ Background Alam Oke."; };
        } else { alert("Harap unggah file berbentuk Gambar/Foto (JPG, PNG)."); }
      }
    });
    
    audioPlayer.addEventListener('loadedmetadata', () => { if (isFinite(audioPlayer.duration)) { durTimeEl.innerText = formatTime(audioPlayer.duration); progressBar.max = 100; } });
    audioPlayer.addEventListener('timeupdate', () => {
      if (isFinite(audioPlayer.duration) && durTimeEl.innerText === "00:00") { durTimeEl.innerText = formatTime(audioPlayer.duration); }
      if (!isDraggingProgress) { const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100; progressBar.value = isNaN(percent) ? 0 : percent; currTimeEl.innerText = formatTime(audioPlayer.currentTime); }
    });
    progressBar.addEventListener('input', () => {
      isDraggingProgress = true;
      if (audioPlayer.duration) { const seekTime = (progressBar.value / 100) * audioPlayer.duration; currTimeEl.innerText = formatTime(seekTime); audioPlayer.currentTime = seekTime; }
    });
    const releaseSeek = () => { isDraggingProgress = false; };
    progressBar.addEventListener('change', releaseSeek); progressBar.addEventListener('touchend', releaseSeek); progressBar.addEventListener('mouseup', releaseSeek);

    function togglePlay() {
      if (!isTrackLoaded) { alert("Pilih Musik Ambient Alam Dulu!"); return; }
      if (!audioCtx) initAudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
      if (audioPlayer.paused) {
        if (!audioPlayer.src || currentPlayIndex >= shuffledPlaylist.length) { playRandomSong(true); } 
        else { audioPlayer.play(); playBtn.innerText = "⏸ PAUSE"; statusBox.innerText = `🎵 Musik ${currentPlayIndex}/${audioFiles.length}: ${currentSongName}`; }
      } else { audioPlayer.pause(); playBtn.innerText = "▶ RESUME"; statusBox.innerText = "⏸ Musik Dijeda."; }
    }
    
    const config = { visType: 'organic_wave', visHeight: 180, fxType: 'none', fxSpeed: 1.0, fxCount: 150 };
    document.getElementById('visType').addEventListener('change', (e) => config.visType = e.target.value);
    document.getElementById('visHeight').addEventListener('input', (e) => config.visHeight = parseInt(e.target.value));
    document.getElementById('fxType').addEventListener('change', (e) => config.fxType = e.target.value);
    document.getElementById('fxSpeed').addEventListener('input', (e) => config.fxSpeed = parseFloat(e.target.value));
    document.getElementById('fxCount').addEventListener('input', (e) => config.fxCount = parseInt(e.target.value));
    
    let time = 0;

    class RealisticNatureParticle {
      constructor() { this.reset(true); }
      reset(init = false) {
        this.x = Math.random() * width;
        this.y = init ? (Math.random() * height) : -20;
        this.speed = Math.random() * 2 + 1;
        this.angle = Math.random() * Math.PI;
        this.wobbleSpeed = Math.random() * 0.04 + 0.01;
        
        const randLayer = Math.random();
        if (randLayer < 0.5) {
          this.layer = 'back'; this.size = Math.random() * 1.5 + 0.5; this.layerSpeedMult = 0.5; this.opacity = Math.random() * 0.2 + 0.1;
        } else if (randLayer < 0.85) {
          this.layer = 'mid'; this.size = Math.random() * 2 + 1.5; this.layerSpeedMult = 1.0; this.opacity = Math.random() * 0.4 + 0.3;
        } else {
          this.layer = 'front'; this.size = Math.random() * 2.5 + 3.5; this.layerSpeedMult = 1.8; this.opacity = Math.random() * 0.3 + 0.5;
        }

        const leafColors = ['#d35400', '#e67e22', '#f39c12', '#bdc542', '#27ae60'];
        this.leafColor = leafColors[Math.floor(Math.random() * leafColors.length)];
        this.rot = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.06;
        
        this.isSplashing = false;
        this.splashTimer = 0;
        this.groundY = height - (Math.random() * 40); 
      }
      update() {
        if (config.fxType === 'none') return;
        let baseSpeed = this.speed * config.fxSpeed * this.layerSpeedMult;
        
        if (this.isSplashing) {
          this.splashTimer++;
          if (this.splashTimer > 8) { this.reset(); }
          return;
        }

        if (config.fxType === 'realistic_rain') {
          this.y += baseSpeed * 5; 
          this.x += (config.fxSpeed * 0.6); 
          if (this.y > this.groundY) {
            if (this.layer === 'back') { this.reset(); } 
            else { this.isSplashing = true; this.splashTimer = 0; }
          }
        } else if (config.fxType === 'soft_snow') {
          this.y += baseSpeed * 0.6; 
          this.angle += this.wobbleSpeed;
          this.x += Math.sin(this.angle) * 0.5; 
          if (this.y > height + 10) { this.reset(); }
        } else if (config.fxType === 'falling_leaves') {
          this.y += baseSpeed * 0.8;
          this.angle += 0.015;
          this.x += Math.sin(this.angle) * 1.0 + (config.fxSpeed * 0.3); 
          this.rot += this.rotSpeed; 
          if (this.y > height + 30) { this.reset(); }
        } else if (config.fxType === 'forest_fireflies') {
          this.y -= baseSpeed * 0.3;
          this.angle += this.wobbleSpeed;
          this.x += Math.cos(this.angle) * 0.4;
          this.opacity = Math.abs(Math.sin(time * 1.5 + this.x * 0.05)) * 0.8; 
          if (this.y < -10) { this.reset(); this.y = height + 10; }
        }
      }
      draw() {
        if (config.fxType === 'none') return;
        ctx.save();
        
        if (this.isSplashing && config.fxType === 'realistic_rain') {
          ctx.strokeStyle = `rgba(200, 230, 255, ${(1 - this.splashTimer / 8) * this.opacity})`;
          ctx.lineWidth = this.size * 0.3;
          ctx.beginPath();
          ctx.ellipse(this.x, this.groundY, this.splashTimer * 1.5, this.splashTimer * 0.4, 0, 0, Math.PI * 2);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, this.groundY); ctx.lineTo(this.x - this.splashTimer, this.groundY - this.splashTimer * 1.2);
          ctx.moveTo(this.x, this.groundY); ctx.lineTo(this.x + this.splashTimer * 0.8, this.groundY - this.splashTimer * 1.5);
          ctx.stroke();
          ctx.restore();
          return;
        }

        if (config.fxType === 'realistic_rain') {
          ctx.strokeStyle = `rgba(185, 222, 255, ${this.opacity * 0.5})`;
          ctx.lineWidth = this.layer === 'front' ? 2.0 : (this.layer === 'mid' ? 1.1 : 0.6);
          ctx.beginPath();
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(this.x + (config.fxSpeed * 0.8), this.y + this.size * 5);
          ctx.stroke();
        } else if (config.fxType === 'soft_snow') {
          ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.85})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 0.7, 0, Math.PI * 2);
          ctx.fill();
        } else if (config.fxType === 'falling_leaves') {
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rot);
          let twistVol = Math.abs(Math.sin(this.rot));
          ctx.fillStyle = this.leafColor;
          ctx.globalAlpha = this.opacity;
          
          ctx.beginPath();
          ctx.ellipse(0, 0, this.size * 3.5, this.size * 1.5 * twistVol, 0, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.25)';
          ctx.lineWidth = 1.0 * twistVol;
          ctx.beginPath();
          ctx.moveTo(-this.size * 3.5, 0);
          ctx.lineTo(this.size * 3.5, 0);
          ctx.stroke();
        } else if (config.fxType === 'forest_fireflies') {
          ctx.fillStyle = `rgba(215, 255, 40, ${this.opacity})`;
          ctx.shadowBlur = this.size * 4; ctx.shadowColor = '#d7ff28';
          ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
      }
    }

    let particles = [];
    for (let i = 0; i < 800; i++) { particles.push(new RealisticNatureParticle()); }

    function getSymmetricVal(index, totalBars, bufferLen) {
      try {
        if (!dataArray) return 0;
        const center = totalBars / 2; const centerDist = Math.abs(index - center) / center;
        const dataIdx = Math.floor(centerDist * (bufferLen / 2)); return dataArray[dataIdx] / 255;
      } catch (e) { return 0; }
    }

    function drawVisualizer(bufferLen) {
      const style = config.visType; 
      ctx.save(); 
      ctx.translate(visX, visY); 
      
      try {
        if (style === 'organic_wave') {
          ctx.beginPath();
          ctx.moveTo(0, 0);
          for (let i = 0; i <= visW; i += 8) {
            let val = getSymmetricVal(i, visW, bufferLen);
            let h = Math.sin(i * 0.05 + time) * (val * config.visHeight * 0.4);
            ctx.lineTo(i, h);
          }
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
          ctx.lineWidth = 3;
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(0, 10);
          for (let i = 0; i <= visW; i += 8) {
            let val = getSymmetricVal(i, visW, bufferLen);
            let h = Math.cos(i * 0.04 - time) * (val * config.visHeight * 0.3);
            ctx.lineTo(i, 10 + h);
          }
          ctx.strokeStyle = 'rgba(120, 255, 214, 0.4)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        } 
        else if (style === 'river_ripple') {
          let numBars = 45; let spacing = visW / numBars; let barW = spacing * 0.5;
          ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
          for (let i = 0; i < numBars; i++) {
            let val = getSymmetricVal(i, numBars, bufferLen);
            let h = val * config.visHeight * 0.8;
            ctx.fillRect(i * spacing, -h / 2, barW, h);
          }
        } 
        else if (style === 'mountain_peaks') {
          ctx.beginPath(); ctx.moveTo(0, 0);
          for (let i = 0; i <= visW; i += 15) {
            let val = getSymmetricVal(i, visW, bufferLen);
            let h = val * config.visHeight;
            ctx.lineTo(i, -h);
          }
          ctx.lineTo(visW, 0); ctx.closePath();
          let grad = ctx.createLinearGradient(0, -config.visHeight, 0, 0);
          grad.addColorStop(0, 'rgba(255, 255, 255, 0.25)');
          grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
          ctx.fillStyle = grad; ctx.fill();
          
          ctx.beginPath();
          for (let i = 0; i <= visW; i += 15) {
            let val = getSymmetricVal(i, visW, bufferLen);
            let h = val * config.visHeight;
            if (i === 0) ctx.moveTo(i, -h); else ctx.lineTo(i, -h);
          }
          ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5; ctx.stroke();
        } 
        else if (style === 'forest_canopy') {
          let numBars = 36; let spacing = visW / numBars; let barW = spacing * 0.6;
          for (let i = 0; i < numBars; i++) {
            let val = getSymmetricVal(i, numBars, bufferLen);
            let h = val * config.visHeight * 0.9;
            ctx.fillStyle = `rgba(168, 255, 120, ${0.3 + val * 0.7})`;
            ctx.fillRect(i * spacing, 0, barW, -h);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(i * spacing - 1, -h - 3, barW + 2, 3);
          }
        } 
        else if (style === 'glowing_embers') {
          let numDots = 15; let spacing = visW / numDots;
          for (let i = 0; i < numDots; i++) {
            let val = getSymmetricVal(i, numDots, bufferLen);
            let r = Math.max(4, val * (config.visHeight * 0.35));
            let x = i * spacing + (spacing / 2);
            let y = -Math.sin(time + i) * 20;
            let radialGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
            radialGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            radialGrad.addColorStop(0.4, 'rgba(120, 255, 214, 0.5)');
            radialGrad.addColorStop(1, 'rgba(120, 255, 214, 0)');
            ctx.fillStyle = radialGrad;
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
          }
        }
        else if (style === 'hanging_vines') {
          let numBars = 40; let spacing = visW / numBars; let barW = spacing * 0.4;
          for (let i = 0; i < numBars; i++) {
            let val = getSymmetricVal(i, numBars, bufferLen);
            let h = val * config.visHeight * 1.2;
            ctx.fillStyle = `rgba(130, 200, 100, ${0.3 + val * 0.7})`;
            let startY = -config.visHeight - 50; 
            ctx.fillRect(i * spacing, startY, barW, h);
            ctx.beginPath();
            ctx.arc(i * spacing + barW / 2, startY + h + 2, barW * 1.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        else if (style === 'ocean_horizon') {
          ctx.beginPath(); ctx.moveTo(0, 0);
          for (let i = 0; i <= visW; i += 10) {
            let val = getSymmetricVal(i, visW, bufferLen);
            let h = val * config.visHeight * 0.6;
            ctx.lineTo(i, -h); 
          }
          ctx.lineTo(visW, 0);
          for (let i = visW; i >= 0; i -= 10) {
            let val = getSymmetricVal(i, visW, bufferLen);
            let h = val * config.visHeight * 0.4;
            ctx.lineTo(i, h); 
          }
          ctx.closePath();
          let grad = ctx.createLinearGradient(0, -config.visHeight * 0.6, 0, config.visHeight * 0.4);
          grad.addColorStop(0, 'rgba(255, 140, 100, 0.9)'); 
          grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.8)'); 
          grad.addColorStop(1, 'rgba(0, 180, 255, 0.6)'); 
          ctx.fillStyle = grad;
          ctx.fill();
        }
        else if (style === 'moon_halo') {
          let cx = visW / 2; let cy = -50; let baseRadius = 50; let numPoints = 60;
          ctx.beginPath();
          for (let i = 0; i <= numPoints; i++) {
            let val = getSymmetricVal(i, numPoints, bufferLen);
            let angle = (i / numPoints) * Math.PI * 2;
            let r = baseRadius + val * config.visHeight * 0.7;
            let x = cx + Math.cos(angle) * r;
            let y = cy + Math.sin(angle) * r;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.strokeStyle = 'rgba(255, 250, 210, 0.9)';
          ctx.lineWidth = 3;
          ctx.shadowBlur = 20;
          ctx.shadowColor = 'rgba(255, 255, 255, 1)';
          ctx.stroke();

          ctx.beginPath(); ctx.arc(cx, cy, baseRadius - 5, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 250, 210, 0.25)'; ctx.fill();
          ctx.shadowBlur = 0; 
        }
        else if (style === 'bamboo_forest') {
          let numBars = 20; let spacing = visW / numBars; let barW = spacing * 0.4;
          for (let i = 0; i < numBars; i++) {
            let val = getSymmetricVal(i, numBars, bufferLen);
            let totalH = val * config.visHeight * 1.3;
            let segments = 5; 
            let segH = totalH / segments;
            for (let j = 0; j < segments; j++) {
              ctx.fillStyle = `rgba(75, 160, 50, ${0.4 + val * 0.6})`;
              let yPos = -(j * segH) - segH + 2; 
              if(j * segH < totalH && segH > 5) {
                ctx.fillRect(i * spacing, yPos, barW, segH - 2);
                ctx.fillStyle = `rgba(180, 230, 90, 0.9)`;
                ctx.fillRect(i * spacing - 2, yPos + segH - 2, barW + 4, 3);
              }
            }
          }
        }
        else if (style === 'starlight_pulse') {
          let numDots = 40;
          for(let i = 0; i < numDots; i++) {
            let val = getSymmetricVal(i, numDots, bufferLen);
            let hashX = Math.abs(Math.sin(i * 12.34)) * visW;
            let hashY = -Math.abs(Math.cos(i * 43.21)) * config.visHeight * 1.5;
            let r = 1 + val * 10; 
            
            ctx.beginPath(); ctx.arc(hashX, hashY, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + val * 0.7})`;
            ctx.shadowBlur = r * 3; ctx.shadowColor = '#fff';
            ctx.fill();
            
            if(val > 0.4) {
              ctx.strokeStyle = `rgba(255, 255, 255, ${val})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(hashX - r * 2.5, hashY); ctx.lineTo(hashX + r * 2.5, hashY);
              ctx.moveTo(hashX, hashY - r * 2.5); ctx.lineTo(hashX, hashY + r * 2.5);
              ctx.stroke();
            }
          }
          ctx.shadowBlur = 0;
        }

      } catch (e) {}
      ctx.restore();
    }

    function animate() {
      ctx.fillStyle = "#090d0b"; ctx.fillRect(0, 0, width, height);
      if (isAudioInit && !audioPlayer.paused) { time += 0.02; }
      
      if (isBgReady) {
        const scale = Math.max(width / bgImageElement.width, height / bgImageElement.height);
        const x = (width / 2) - (bgImageElement.width / 2) * scale; const y = (height / 2) - (bgImageElement.height / 2) * scale;
        ctx.drawImage(bgImageElement, x, y, bgImageElement.width * scale, bgImageElement.height * scale);
      }
      
      for (let i = 0; i < config.fxCount; i++) { if (particles[i]) { particles[i].update(); particles[i].draw(); } }
      
      if (isAudioInit && !audioPlayer.paused && currentObjectUrl) { analyser.getByteFrequencyData(dataArray); } 
      else if (dataArray) { for (let i = 0; i < dataArray.length; i++) { dataArray[i] = Math.max(0, dataArray[i] - 5); } }
      
      drawVisualizer(isAudioInit ? analyser.frequencyBinCount : 128);
      requestAnimationFrame(animate);
    }
    animate();
    
    let mediaRecorder, chunks = []; let recordStartTime = 0;

    function startCountdownAndRecord() {
      if (!isAudioInit || !currentObjectUrl) { alert("Pilih musik ambient alam bebas dulu bos!"); return; }
      if (isCountingDown) { clearInterval(countdownTimer); isCountingDown = false; countdownOverlay.style.display = 'none'; recordBtn.innerText = "🔴 MULAI REKAM NATURE 720p"; return; }
      isCountingDown = true; let counter = 3; countdownOverlay.innerText = counter; countdownOverlay.style.display = 'block'; recordBtn.innerText = "❌ BATALKAN REKAM (" + counter + ")";
      countdownTimer = setInterval(() => {
        counter--; if (counter > 0) { countdownOverlay.innerText = counter; recordBtn.innerText = "❌ BATALKAN REKAM (" + counter + ")"; } 
        else { clearInterval(countdownTimer); isCountingDown = false; countdownOverlay.style.display = 'none'; executeRecording(); }
      }, 1000);
    }

    function executeRecording() {
      if (!audioCtx) initAudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.KeepAwake) { window.Capacitor.Plugins.KeepAwake.keepAwake(); }
      audioPlayer.play(); playBtn.innerText = "⏸ PAUSE"; stopOverlay.style.display = 'block'; statusBox.innerText = "🔴 Merekam Keasrian Alam..."; recordBtn.innerText = "🔴 SEDANG MEREKAM";
      
      const stream = canvas.captureStream(30); 
      const combined = new MediaStream([...stream.getVideoTracks(), mediaStreamDestination.stream.getAudioTracks()[0]]);
      let options = { mimeType: 'video/webm;codecs=vp8,opus' }; if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/webm' }; }
      
      try { mediaRecorder = new MediaRecorder(combined, options); } catch (e) { mediaRecorder = new MediaRecorder(combined); }
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = saveVideoWebM; chunks = []; recordStartTime = Date.now(); mediaRecorder.start(1000);
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.KeepAwake) { window.Capacitor.Plugins.KeepAwake.allowSleep(); }
      audioPlayer.pause(); playBtn.innerText = "▶ PLAY"; stopOverlay.style.display = 'none'; recordBtn.innerText = "🔴 MULAI REKAM NATURE 720p"; statusBox.innerText = "Menyiapkan file video...";
      if (playTimeout) clearTimeout(playTimeout);
    }

    function saveVideoWebM() {
      const blob = new Blob(chunks, { type: 'video/webm' }); const recordDuration = Date.now() - recordStartTime;
      statusBox.innerText = "⏳ Menjahit durasi otomatis (Biar bisa di-skip)...";
      if (typeof ysFixWebmDuration === 'function') { ysFixWebmDuration(blob, recordDuration, function(fixedBlob) { triggerDownload(fixedBlob); }); } 
      else { triggerDownload(blob); }
    }

    function triggerDownload(finalBlob) {
      statusBox.innerText = "⏳ Memproses pemotongan data sinematik...";
      const url = URL.createObjectURL(finalBlob);
      const oldVid = document.getElementById('previewVid'); if(oldVid) oldVid.remove();
      const oldBtn = document.getElementById('shareBtnDewa'); if(oldBtn) oldBtn.remove();
      
      const vid = document.createElement('video'); vid.id = 'previewVid'; vid.src = url; vid.controls = true;
      vid.setAttribute('controlsList', 'nodownload'); vid.style.width = "100%"; vid.style.marginTop = "20px"; vid.style.border = "3px solid #a8ff78"; vid.style.borderRadius = "8px";
      
      const saveBtn = document.createElement('button'); saveBtn.id = 'shareBtnDewa'; saveBtn.innerText = "📥 SIMPAN VIDEO ALAM KE HP / PC";
      saveBtn.style.width = "100%"; saveBtn.style.padding = "15px"; saveBtn.style.marginTop = "10px";
      saveBtn.style.background = "linear-gradient(135deg, #a8ff78, #78ffd6)"; saveBtn.style.color = "#111"; saveBtn.style.border = "none"; saveBtn.style.borderRadius = "8px"; saveBtn.style.fontWeight = "bold"; saveBtn.style.fontSize = "14px"; saveBtn.style.cursor = "pointer";
      
      let isSaving = false;
      saveBtn.onclick = async () => {
        if (isSaving) return; isSaving = true; saveBtn.innerText = "⏳ MEMULAI PROSES SIMPAN...";
        try {
          if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Filesystem) {
            const FS = window.Capacitor.Plugins.Filesystem; const fileName = `Lova_Nature_HD_${Date.now()}.webm`;
            await FS.writeFile({ path: fileName, data: "", directory: 'DOCUMENTS' });
            const chunkSize = 1572864; const totalChunks = Math.ceil(finalBlob.size / chunkSize);
            for (let i = 0; i < totalChunks; i++) {
              const start = i * chunkSize; const end = Math.min(start + chunkSize, finalBlob.size); const chunk = finalBlob.slice(start, end);
              const base64Chunk = await new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result.split(',')[1]); reader.onerror = reject; reader.readAsDataURL(chunk); });
              await FS.appendFile({ path: fileName, data: base64Chunk, directory: 'DOCUMENTS' });
              const percent = Math.round(((i + 1) / totalChunks) * 100); statusBox.innerText = `⏳ Memasukkan data fajar ke HP... ${percent}%`; saveBtn.innerText = `⏳ MENYIMPAN... ${percent}%`;
            }
            saveBtn.innerText = "✅ VIDEO SUKSES MASUK DOCUMENTS!"; statusBox.innerText = `🎉 BERHASIL! Video alam bebas sudah terbuat dan bisa di-skip!`;
          } else {
            statusBox.innerText = "⏳ Mengunduh lewat Browser...";
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `Lova_Nature_HD_${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); }, 100);

            saveBtn.innerText = "✅ VIDEO SUKSES DIUNDUH!";
            statusBox.innerText = `🎉 SUKSES! Video alam berhasil diunduh ke perangkat Anda.`;
          }
        } catch(e) { saveBtn.innerText = "❌ GAGAL MENYIMPAN"; statusBox.innerText = "Terjadi Error: " + e.message; isSaving = false; }
      };
      
      const controlsDiv = document.getElementById('controls'); controlsDiv.appendChild(vid); controlsDiv.appendChild(saveBtn);
      saveBtn.scrollIntoView({ behavior: 'smooth' });
      
      setTimeout(() => { if(!isSaving) saveBtn.click(); }, 1500);
    }
  </script>
