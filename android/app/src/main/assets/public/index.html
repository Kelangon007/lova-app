<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ambient v.1</title>
  <script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.5/fix-webm-duration.js"></script>
  <style>
    body { margin: 0; background: #050505; font-family: sans-serif; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
    #canvas-wrapper { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; margin-top: 20px; border: 1px solid #333; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    canvas { width: 100%; height: 100%; display: block; }
    #controls { width: 90%; max-width: 600px; background: #151515; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
    .btn-group { display: flex; gap: 8px; }
    .file-label { flex: 1; background: #222; color: #ccc; padding: 12px; text-align: center; border-radius: 6px; cursor: pointer; border: 1px solid #444; font-size: 11px; font-weight: bold; }
    .play-group { display: flex; gap: 8px; }
    #playBtn { flex: 2; padding: 15px; background: #333; color: #aaa; border: 1px solid #444; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #playBtn.ready { background: #4caf50; color: white; }
    #nextBtn { flex: 1; padding: 15px; background: #333; color: #aaa; border: 1px solid #444; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-record { width: 100%; padding: 15px; background: #c62828; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #statusBox { font-size: 12px; text-align: center; color: #4caf50; margin-bottom: 5px; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div id="canvas-wrapper"><canvas id="canvas" width="1280" height="720"></canvas></div>
  <div id="controls">
    <div id="statusBox">Ambient v.1 - Siap.</div>
    <div class="btn-group">
        <label class="file-label" onclick="document.getElementById('bgInput').click()">PILIH FOTO</label>
        <label class="file-label" onclick="document.getElementById('audioInput').click()">PILIH MUSIK</label>
    </div>
    <div class="play-group">
        <button id="playBtn" onclick="togglePlay()">▶ PLAY</button>
        <button id="nextBtn" onclick="playNext()">⏭ NEXT</button>
    </div>
    <input type="file" id="bgInput" accept="image/*">
    <input type="file" id="audioInput" accept="audio/*" multiple>
    <button class="btn-record" id="recordBtn" onclick="startCountdownAndRecord()">🔴 REKAM AMBIENT 720p</button>
  </div>
  <audio id="audioPlayer"></audio>

  <script>
    const statusBox = document.getElementById('statusBox');
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const playBtn = document.getElementById('playBtn'), audioPlayer = document.getElementById('audioPlayer');
    const recordBtn = document.getElementById('recordBtn');
    let bgImg = new Image(), audioFiles = [], currentIdx = 0;
    
    // SISTEM MEDIA DAN ANIMASI STANDAR (DISEDERHANAKAN DI SINI UNTUK FOKUS KE PENYIMPANAN)
    document.getElementById('bgInput').onchange = (e) => { 
        bgImg.src = URL.createObjectURL(e.target.files[0]); 
        bgImg.onload = () => statusBox.innerText = "✅ Foto Latar Oke.";
    };
    
    document.getElementById('audioInput').onchange = (e) => { 
        audioFiles = Array.from(e.target.files); 
        playBtn.classList.add('ready');
        statusBox.innerText = "✅ Musik Siap.";
    };

    function playNext() {
        if(audioFiles.length === 0) return;
        audioPlayer.src = URL.createObjectURL(audioFiles[currentIdx % audioFiles.length]);
        audioPlayer.play();
        currentIdx++;
        playBtn.innerText = "⏸ PAUSE";
    }

    function togglePlay() {
        if(!audioFiles.length) return alert("Pilih musik dulu!");
        if(audioPlayer.paused) { if(!audioPlayer.src) playNext(); else audioPlayer.play(); playBtn.innerText = "⏸ PAUSE"; }
        else { audioPlayer.pause(); playBtn.innerText = "▶ PLAY"; }
    }

    function animate() {
      ctx.fillStyle = "#000"; ctx.fillRect(0,0,1280,720);
      if(bgImg.src) {
        let s = Math.max(1280/bgImg.width, 720/bgImg.height);
        ctx.drawImage(bgImg, (1280-bgImg.width*s)/2, (720-bgImg.height*s)/2, bgImg.width*s, bgImg.height*s);
      }
      requestAnimationFrame(animate);
    }
    animate();

    // ==========================================
    // MESIN REKAM & PENYIMPANAN ANTI-GAGAL ANDROID 9
    // ==========================================
    let mediaRecorder, chunks = []; let recordStartTime = 0;
    let audioCtx, mediaStreamDestination;

    function initAudioContext() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); 
      let source = audioCtx.createMediaElementSource(audioPlayer); 
      mediaStreamDestination = audioCtx.createMediaStreamDestination();
      source.connect(audioCtx.destination); 
      source.connect(mediaStreamDestination);
    }

    function startCountdownAndRecord() {
      if(audioFiles.length === 0) return alert("Pilih musik dulu bos!");
      if(!audioCtx) initAudioContext();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.KeepAwake) { 
          window.Capacitor.Plugins.KeepAwake.keepAwake(); 
      }
      
      audioPlayer.play(); playBtn.innerText = "⏸ PAUSE";
      statusBox.innerText = "🔴 SEDANG MEREKAM...";
      recordBtn.innerText = "⏹ STOP REKAM";
      recordBtn.style.background = "#000";
      recordBtn.onclick = stopRecording;
      
      const stream = canvas.captureStream(30); 
      const combined = new MediaStream([...stream.getVideoTracks(), mediaStreamDestination.stream.getAudioTracks()[0]]);
      let options = { mimeType: 'video/webm;codecs=vp8,opus' }; 
      if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/webm' }; }
      
      mediaRecorder = new MediaRecorder(combined, options);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = saveVideoWebM; 
      chunks = []; recordStartTime = Date.now(); mediaRecorder.start(1000);
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.KeepAwake) window.Capacitor.Plugins.KeepAwake.allowSleep();
      audioPlayer.pause(); playBtn.innerText = "▶ PLAY";
      recordBtn.innerText = "🔴 MULAI REKAM AMBIENT 720p";
      recordBtn.style.background = "#c62828";
      recordBtn.onclick = startCountdownAndRecord;
      statusBox.innerText = "Menyiapkan file video...";
    }

    function saveVideoWebM() {
      const blob = new Blob(chunks, { type: 'video/webm' }); 
      const recordDuration = Date.now() - recordStartTime;
      statusBox.innerText = "⏳ Menjahit durasi otomatis...";
      if (typeof ysFixWebmDuration === 'function') { 
          ysFixWebmDuration(blob, recordDuration, function(fixedBlob) { triggerDownload(fixedBlob); }); 
      } else { 
          triggerDownload(blob); 
      }
    }

    function triggerDownload(finalBlob) {
      statusBox.innerText = "⏳ Menyiapkan tombol simpan...";
      const url = URL.createObjectURL(finalBlob);
      const oldVid = document.getElementById('previewVid'); if(oldVid) oldVid.remove();
      const oldBtn = document.getElementById('shareBtnDewa'); if(oldBtn) oldBtn.remove();
      
      const vid = document.createElement('video'); vid.id = 'previewVid'; vid.src = url; vid.controls = true;
      vid.style.width = "100%"; vid.style.marginTop = "20px"; vid.style.border = "3px solid #4caf50"; vid.style.borderRadius = "8px";
      
      const saveBtn = document.createElement('button'); saveBtn.id = 'shareBtnDewa'; saveBtn.innerText = "📥 SIMPAN KE FOLDER 'DOWNLOAD'";
      saveBtn.style.width = "100%"; saveBtn.style.padding = "15px"; saveBtn.style.marginTop = "10px";
      saveBtn.style.background = "#4caf50"; saveBtn.style.color = "white"; saveBtn.style.border = "none"; saveBtn.style.borderRadius = "8px"; saveBtn.style.fontWeight = "bold"; saveBtn.style.cursor = "pointer";
      
      let isSaving = false;
      saveBtn.onclick = async () => {
        if (isSaving) return; isSaving = true; 
        saveBtn.innerText = "⏳ MEMINTA IZIN & MENYIMPAN...";
        
        try {
          if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Filesystem) {
            const FS = window.Capacitor.Plugins.Filesystem;
            
            // 1. Minta izin akses memori (Khusus Android Lama)
            try { 
                let perm = await FS.checkPermissions();
                if (perm.publicStorage !== 'granted') await FS.requestPermissions(); 
            } catch(e) { console.log("Skip perm check"); }
            
            // 2. Kunci Target: Folder "Download" di EXTERNAL_STORAGE
            const fileName = `Download/Ambient_${Date.now()}.webm`;
            await FS.writeFile({ path: fileName, data: "", directory: 'EXTERNAL_STORAGE' });
            
            const chunkSize = 1572864; // 1.5MB per putaran
            const totalChunks = Math.ceil(finalBlob.size / chunkSize);
            
            for (let i = 0; i < totalChunks; i++) {
              const start = i * chunkSize; 
              const end = Math.min(start + chunkSize, finalBlob.size); 
              const chunk = finalBlob.slice(start, end);
              const base64Chunk = await new Promise((resolve, reject) => { 
                  const reader = new FileReader(); 
                  reader.onload = () => resolve(reader.result.split(',')[1]); 
                  reader.onerror = reject; reader.readAsDataURL(chunk); 
              });
              await FS.appendFile({ path: fileName, data: base64Chunk, directory: 'EXTERNAL_STORAGE' });
              
              const percent = Math.round(((i + 1) / totalChunks) * 100); 
              statusBox.innerText = `⏳ Menulis ke memori HP... ${percent}%`; 
              saveBtn.innerText = `⏳ MENYIMPAN... ${percent}%`;
            }
            saveBtn.innerText = "✅ CEK FOLDER DOWNLOAD DI HP!"; 
            statusBox.innerText = `🎉 SUKSES! Video tersimpan di folder Download.`;
          } else {
            throw new Error("Bukan Aplikasi Capacitor");
          }
        } catch(e) { 
            saveBtn.innerText = "❌ GAGAL SIMPAN. IZINKAN AKSES FILE!"; 
            statusBox.innerText = "Error: Pastikan izin memori (Storage) aktif di Pengaturan HP."; 
            isSaving = false; 
        }
      };
      
      const controlsDiv = document.getElementById('controls'); 
      controlsDiv.appendChild(vid); controlsDiv.appendChild(saveBtn);
      saveBtn.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
